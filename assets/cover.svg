<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">First Abu Dhabi Bank cyberfraud risk assessment cover</title>
  <desc id="desc">Academic passive OSINT risk assessment cover showing digital footprint, cyberfraud risk and mitigation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061826"/>
      <stop offset="55%" stop-color="#0B3147"/>
      <stop offset="100%" stop-color="#102A43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <circle cx="1020" cy="70" r="190" fill="#1E7494" opacity="0.18"/>
  <circle cx="170" cy="360" r="210" fill="#2DD4BF" opacity="0.10"/>

  <g opacity="0.18" stroke="#FFFFFF" stroke-width="1">
    <path d="M80 92 H1120"/>
    <path d="M80 154 H1120"/>
    <path d="M80 216 H1120"/>
    <path d="M80 278 H1120"/>
    <path d="M150 40 V380"/>
    <path d="M320 40 V380"/>
    <path d="M490 40 V380"/>
    <path d="M660 40 V380"/>
    <path d="M830 40 V380"/>
    <path d="M1000 40 V380"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="74" width="1028" height="272" rx="28" fill="#081C2D" opacity="0.86"/>
    <rect x="86" y="74" width="1028" height="272" rx="28" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.75"/>
  </g>

  <g transform="translate(126 112)">
    <text x="0" y="0" fill="#E6F6FF" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="3">ACADEMIC RESEARCH</text>
    <text x="0" y="54" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">First Abu Dhabi Bank</text>
    <text x="0" y="106" fill="#A7F3D0" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Cyberfraud Risk Assessment</text>
    <text x="0" y="154" fill="#D6EAF5" font-family="Arial, Helvetica, sans-serif" font-size="22">Passive OSINT · Digital Footprint · Phishing · BEC · Social Engineering</text>
  </g>

  <g transform="translate(840 120)">
    <rect x="0" y="0" width="174" height="118" rx="18" fill="#0E4666" stroke="#38BDF8" stroke-width="2" opacity="0.95"/>
    <path d="M52 54 V42 C52 23 68 10 87 10 C106 10 122 23 122 42 V54" fill="none" stroke="#A7F3D0" stroke-width="10" stroke-linecap="round"/>
    <rect x="42" y="52" width="90" height="54" rx="10" fill="#A7F3D0"/>
    <circle cx="87" cy="77" r="8" fill="#0B3147"/>
    <path d="M87 85 V96" stroke="#0B3147" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g transform="translate(795 282)" fill="#CFFAFE" font-family="Arial, Helvetica, sans-serif" font-size="15">
    <text x="0" y="0">public information → possible misuse → fraud risk → mitigation</text>
  </g>
</svg>